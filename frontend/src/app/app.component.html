<main class="loans">
  <section class="loans--container">
    <h1>Loan Management</h1>

    <div *ngIf="loading" class="loans--state">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="error" class="loans--state loans--error">
      <p>{{ error }}</p>
      <button mat-stroked-button (click)="loadLoans()">Retry</button>
    </div>

    <table
      *ngIf="!loading && !error"
      mat-table
      [dataSource]="loans"
      class="mat-elevation-z8"
    >
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Loan Amount</th>
        <td mat-cell *matCellDef="let element">
          {{ element.amount | currency }}
        </td>
      </ng-container>

      <ng-container matColumnDef="currentBalance">
        <th mat-header-cell *matHeaderCellDef>Current Balance</th>
        <td mat-cell *matCellDef="let element">
          {{ element.currentBalance | currency }}
        </td>
      </ng-container>

      <ng-container matColumnDef="applicantName">
        <th mat-header-cell *matHeaderCellDef>Applicant</th>
        <td mat-cell *matCellDef="let element">{{ element.applicantName }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">
          <span class="status status--{{ element.status }}">{{
            element.status
          }}</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <p *ngIf="!loading && !error && loans.length === 0" class="loans--state">
      No loans found.
    </p>
  </section>
</main>
